<section class="section" id="contact">
  <div class="container">

    <div class="section-header reveal">
      <span class="section-tag">// reach_out</span>
      <h2 class="section-title">Contact</h2>
      <div class="section-line"></div>
    </div>

    <div class="contact-grid">

      <!-- Contact Info -->
      <div class="contact-left reveal">
        <h3 class="contact-info-title">Let's Build Something Together</h3>
        <p class="contact-info-desc">
          Have a project in mind? Looking to collaborate? Or just want to say hello?
          My inbox is always open. I'll get back to you as soon as possible.
        </p>

        <div class="contact-detail">
          <div class="contact-icon"><i class="fas fa-envelope"></i></div>
          <div class="contact-detail-text">
            <span class="contact-detail-label">Email</span>
            <a href="mailto:anim3654@gmail.com" class="contact-detail-value">anim3654@gmail.com</a>
          </div>
        </div>

        <div class="contact-detail">
          <div class="contact-icon"><i class="fas fa-phone"></i></div>
          <div class="contact-detail-text">
            <span class="contact-detail-label">Phone</span>
            <a href="tel:+8801996394253" class="contact-detail-value">+880 1996 394 253</a>
          </div>
        </div>

        <div class="contact-detail">
          <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
          <div class="contact-detail-text">
            <span class="contact-detail-label">Location</span>
            <span class="contact-detail-value">Bangladesh 🇧🇩</span>
          </div>
        </div>

        <!-- Social links -->
        <div class="social-links">
          <a href="https://github.com/anim710" target="_blank" class="social-link" title="GitHub">
            <i class="fab fa-github"></i>
          </a>
          <a href="https://www.linkedin.com/in/md-zahidul-hoque-anim/" target="_blank" class="social-link" title="LinkedIn">
            <i class="fab fa-linkedin-in"></i>
          </a>
          <a href="https://www.facebook.com/zahid.anim.2024" target="_blank" class="social-link" title="Facebook">
            <i class="fab fa-facebook-f"></i>
          </a>
          <a href="https://x.com/zanim710" target="_blank" class="social-link" title="X / Twitter">
            <i class="fab fa-x-twitter"></i>
          </a>
          <a href="mailto:anim3654@gmail.com" class="social-link" title="Email">
            <i class="fas fa-envelope"></i>
          </a>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="contact-form-wrap reveal">
        <form class="contact-form" id="contact-form" novalidate>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="cf-name">Your Name</label>
              <input class="form-input" type="text" id="cf-name" name="name" placeholder="John Doe" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="cf-email">Email Address</label>
              <input class="form-input" type="email" id="cf-email" name="email" placeholder="john@example.com" required />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="cf-subject">Subject</label>
            <input class="form-input" type="text" id="cf-subject" name="subject" placeholder="Project Collaboration" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="cf-message">Message</label>
            <textarea class="form-textarea" id="cf-message" name="message" placeholder="Tell me about your project or just say hi..." required></textarea>
          </div>

          <button type="submit" class="btn-neon" style="width:100%; justify-content:center;">
            <i class="fas fa-paper-plane"></i> Send Message
          </button>

          <p class="form-status" id="form-status"></p>
        </form>
      </div>

    </div>
  </div>
</section>
